<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background radial -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#0d1a2e"/>
      <stop offset="100%" stop-color="#050b14"/>
    </radialGradient>

    <!-- Cyan glow for main mark -->
    <radialGradient id="cyanGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Main bracket gradient -->
    <linearGradient id="bracketGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#00b0cc"/>
    </linearGradient>

    <!-- Tilde/lazy line gradient -->
    <linearGradient id="lazyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0"/>
      <stop offset="30%" stop-color="#a855f7"/>
      <stop offset="70%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </linearGradient>

    <!-- Scaffold grid line -->
    <linearGradient id="gridGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00e5ff" stop-opacity="0.4"/>
      <stop offset="70%" stop-color="#a855f7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>

    <!-- Outer ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0.1"/>
    </linearGradient>

    <!-- Glow filter for brackets -->
    <filter id="glowCyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glow filter for tilde -->
    <filter id="glowPurple" x="-40%" y="-100%" width="180%" height="300%">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow for bg circle -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip to rounded square -->
    <clipPath id="roundedClip">
      <rect x="0" y="0" width="512" height="512" rx="96" ry="96"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- Subtle grid dots pattern -->
  <g clip-path="url(#roundedClip)" opacity="0.07">
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1.2" fill="#00e5ff"/>
    </pattern>
    <rect x="0" y="0" width="512" height="512" fill="url(#dots)"/>
  </g>

  <!-- Background glow halo -->
  <ellipse cx="256" cy="256" rx="160" ry="160" fill="url(#cyanGlow)" filter="url(#softGlow)"/>

  <!-- Outer decorative ring — dashed arc feel -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#ringGrad)" stroke-width="1" stroke-dasharray="4 8" opacity="0.5"/>
  <circle cx="256" cy="256" r="198" fill="none" stroke="#00e5ff" stroke-width="0.5" stroke-dasharray="1 12" opacity="0.3"/>

  <!-- Corner tick marks (scaffold reference points) -->
  <g stroke="#00e5ff" stroke-width="2" opacity="0.4">
    <!-- top-left -->
    <line x1="100" y1="116" x2="116" y2="116"/>
    <line x1="116" y1="100" x2="116" y2="116"/>
    <!-- top-right -->
    <line x1="412" y1="116" x2="396" y2="116"/>
    <line x1="396" y1="100" x2="396" y2="116"/>
    <!-- bottom-left -->
    <line x1="100" y1="396" x2="116" y2="396"/>
    <line x1="116" y1="412" x2="116" y2="396"/>
    <!-- bottom-right -->
    <line x1="412" y1="396" x2="396" y2="396"/>
    <line x1="396" y1="412" x2="396" y2="396"/>
  </g>

  <!-- Scaffold vertical rails (background, faint) -->
  <g stroke="url(#gridGrad)" stroke-width="1.5" opacity="0.35">
    <line x1="185" y1="148" x2="185" y2="364"/>
    <line x1="256" y1="138" x2="256" y2="374"/>
    <line x1="327" y1="148" x2="327" y2="364"/>
  </g>

  <!-- Scaffold horizontal rungs (background, faint) -->
  <g stroke="url(#gridGrad)" stroke-width="1.5" opacity="0.25">
    <line x1="178" y1="185" x2="334" y2="185"/>
    <line x1="178" y1="256" x2="334" y2="256"/>
    <line x1="178" y1="327" x2="334" y2="327"/>
  </g>

  <!--
    MAIN MARK: { ~ }
    Curly braces = Go / code
    Tilde = lazy / deferred / at rest
  -->

  <!-- LEFT CURLY BRACE { -->
  <!-- Built from path: top arm, boss (left-pointing knuckle), bottom arm -->
  <path d="
    M 220 166
    C 204 166, 192 172, 192 188
    L 192 232
    C 192 242, 184 248, 174 256
    C 184 264, 192 270, 192 280
    L 192 324
    C 192 340, 204 346, 220 346
  " fill="none" stroke="url(#bracketGrad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" filter="url(#glowCyan)"/>

  <!-- RIGHT CURLY BRACE } -->
  <path d="
    M 292 166
    C 308 166, 320 172, 320 188
    L 320 232
    C 320 242, 328 248, 338 256
    C 328 264, 320 270, 320 280
    L 320 324
    C 320 340, 308 346, 292 346
  " fill="none" stroke="url(#bracketGrad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" filter="url(#glowCyan)"/>

  <!-- TILDE ~ (lazy / deferred) — the soul of the icon -->
  <!-- Custom tilde wave centered at 256,256 -->
  <path d="
    M 196 256
    C 210 238, 226 238, 240 256
    C 254 274, 270 274, 284 256
    C 298 238, 314 238, 328 256
  " fill="none" stroke="url(#lazyGrad)" stroke-width="8" stroke-linecap="round" filter="url(#glowPurple)"/>

  <!-- Small glow dot at tilde center -->
  <circle cx="256" cy="256" r="3" fill="#a855f7" opacity="0.8" filter="url(#glowPurple)"/>

  <!-- WORDMARK: lazy.go -->
  <!-- "lazy" in cyan Share Tech Mono style -->
  <text
    x="256" y="420"
    font-family="'Share Tech Mono', 'Courier New', monospace"
    font-size="28"
    font-weight="400"
    letter-spacing="6"
    text-anchor="middle"
    fill="#00e5ff"
    opacity="0.85"
    filter="url(#glowCyan)"
  >lazy.go</text>

  <!-- Underline accent for wordmark -->
  <line x1="196" y1="430" x2="316" y2="430" stroke="url(#lazyGrad)" stroke-width="1.5" opacity="0.5"/>

  <!-- Version indicator dots (3 dots = scaffold nodes / goroutines) -->
  <g fill="#00e5ff" opacity="0.5">
    <circle cx="233" cy="446" r="2"/>
    <circle cx="256" cy="446" r="2"/>
    <circle cx="279" cy="446" r="2"/>
  </g>

  <!-- Top label: small "had-nu/" in purple -->
  <text
    x="256" y="98"
    font-family="'Share Tech Mono', 'Courier New', monospace"
    font-size="16"
    font-weight="400"
    letter-spacing="3"
    text-anchor="middle"
    fill="#a855f7"
    opacity="0.6"
  >had-nu/</text>
</svg>
